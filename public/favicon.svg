<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <circle cx="32" cy="32" r="32" fill="#fdf6ee"/>
  <circle cx="32" cy="32" r="31" fill="none" stroke="#d4a017" stroke-width="1.2" opacity="0.5"/>

  <!-- Petals: alternating sky blue (boy) + blush pink (girl) -->
  <g transform="translate(32 30)">
    <g>
      <ellipse cx="0" cy="-13" rx="6.5" ry="11" fill="#b8d8f0" opacity="0.92"/>
    </g>
    <g transform="rotate(60)">
      <ellipse cx="0" cy="-13" rx="6.5" ry="11" fill="#f6b8c5" opacity="0.92"/>
    </g>
    <g transform="rotate(120)">
      <ellipse cx="0" cy="-13" rx="6.5" ry="11" fill="#b8d8f0" opacity="0.92"/>
    </g>
    <g transform="rotate(180)">
      <ellipse cx="0" cy="-13" rx="6.5" ry="11" fill="#f6b8c5" opacity="0.92"/>
    </g>
    <g transform="rotate(240)">
      <ellipse cx="0" cy="-13" rx="6.5" ry="11" fill="#b8d8f0" opacity="0.92"/>
    </g>
    <g transform="rotate(300)">
      <ellipse cx="0" cy="-13" rx="6.5" ry="11" fill="#f6b8c5" opacity="0.92"/>
    </g>
    <!-- Inner petals -->
    <g transform="rotate(30)">
      <ellipse cx="0" cy="-8" rx="4" ry="7" fill="#dceaf5" opacity="0.95"/>
    </g>
    <g transform="rotate(90)">
      <ellipse cx="0" cy="-8" rx="4" ry="7" fill="#f9d5d6" opacity="0.95"/>
    </g>
    <g transform="rotate(150)">
      <ellipse cx="0" cy="-8" rx="4" ry="7" fill="#dceaf5" opacity="0.95"/>
    </g>
    <g transform="rotate(210)">
      <ellipse cx="0" cy="-8" rx="4" ry="7" fill="#f9d5d6" opacity="0.95"/>
    </g>
    <g transform="rotate(270)">
      <ellipse cx="0" cy="-8" rx="4" ry="7" fill="#dceaf5" opacity="0.95"/>
    </g>
    <g transform="rotate(330)">
      <ellipse cx="0" cy="-8" rx="4" ry="7" fill="#f9d5d6" opacity="0.95"/>
    </g>
    <!-- Center: sage green -->
    <circle cx="0" cy="0" r="5" fill="#7faa8a"/>
    <circle cx="0" cy="0" r="2.5" fill="#d4a017"/>
  </g>

  <!-- Stem -->
  <path d="M32 44 Q33 50 31 57" stroke="#8aaa8a" stroke-width="2.2" fill="none" stroke-linecap="round"/>
  <!-- Leaf -->
  <path d="M32 50 Q38 48 39 53 Q35 54 32 52 Z" fill="#8aaa8a" opacity="0.9"/>
</svg>
